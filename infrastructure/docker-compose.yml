version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: platform-db
    restart: always
    environment:
      POSTGRES_USER: platform_user
      POSTGRES_PASSWORD: platform_secure_pass_9988
      POSTGRES_DB: platform_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_user -d platform_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: platform-vectorstore
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: platform-backend
    restart: always
    environment:
      - APP_NAME=Ultimate Multimodal AI Platform
      - API_V1_STR=/api/v1
      - DATABASE_URL=postgresql://platform_user:platform_secure_pass_9988@postgres:5432/platform_prod
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - INFERENCE_MODE=real
      - SECRET_KEY=PROD_ENCRYPT_SECRET_KEY_CHANGE_IMMEDIATELY_99
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/d:/Abhishek/AI/backend/app/static/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: platform-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_media:
